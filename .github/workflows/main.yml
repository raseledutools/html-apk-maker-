name: RasFocus Hybrid APK Builder

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🛠️ Setup Android Project Structure
        run: |
          mkdir -p app/src/main/assets
          mkdir -p app/src/main/java/com/rasel/rasfocus
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/xml

          # তোমার ৩টি ফাইল কপি করা হচ্ছে
          find . -maxdepth 1 -name "index.html" -exec cp {} app/src/main/assets/ \;
          find . -maxdepth 1 -name "BlockerService.java" -exec cp {} app/src/main/java/com/rasel/rasfocus/ \;
          find . -maxdepth 1 -name "MainActivity.java" -exec cp {} app/src/main/java/com/rasel/rasfocus/ \;

          # অ্যান্ড্রয়েড ম্যানিফেস্ট
          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.rasel.rasfocus">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW"/>
              <application android:label="RasFocus+" android:theme="@android:style/Theme.NoTitleBar.Fullscreen">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>
                  </activity>
                  <service android:name=".BlockerService" android:permission="android.permission.BIND_ACCESSIBILITY_SERVICE" android:exported="false">
                      <intent-filter><action android:name="android.accessibilityservice.AccessibilityService" /></intent-filter>
                      <meta-data android:name="android.accessibilityservice" android:resource="@xml/accessibility_service_config" />
                  </service>
              </application>
          </manifest>
          EOF

          cat << 'EOF' > app/src/main/res/xml/accessibility_service_config.xml
          <accessibility-service xmlns:android="http://schemas.android.com/apk/res/android"
              android:accessibilityEventTypes="typeWindowContentChanged|typeWindowStateChanged"
              android:accessibilityFeedbackType="feedbackGeneric"
              android:accessibilityFlags="flagDefault|flagIncludeNotImportantViews|flagRetrieveInteractiveWindows"
              android:canRetrieveWindowContent="true"
              android:description="@string/accessibility_desc" />
          EOF

          echo '<resources><string name="accessibility_desc">RasFocus Blocker Active</string></resources>' > app/src/main/res/values/strings.xml

          # প্রজেক্ট লেভেল বিল্ড ফাইল (Modern Syntax)
          cat << 'EOF' > build.gradle
          plugins {
              id 'com.android.application' version '8.1.0' apply false
              id 'com.android.library' version '8.1.0' apply false
          }
          EOF

          # অ্যাপ লেভেল বিল্ড ফাইল (Modern Syntax)
          cat << 'EOF' > app/build.gradle
          plugins {
              id 'com.android.application'
          }
          android {
              compileSdk 34
              namespace 'com.rasel.rasfocus'
              defaultConfig {
                  applicationId "com.rasel.rasfocus"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
          }
          EOF

          echo "include ':app'" > settings.gradle

      - name: 🚀 Build APK with Gradle Wrapper
        run: |
          # গ্রেডল র‍্যাপার জেনারেট করে বিল্ড শুরু করা
          gradle wrapper --gradle-version 8.2
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: 📥 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RasFocus-Final-Build
          path: app/build/outputs/apk/debug/*.apk
